name: "Copilot Setup Steps"

# Run automatically when this file changes, and allow manual runs from the Actions tab.
on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  # The job MUST be named `copilot-setup-steps` to be recognised by the Copilot coding agent.
  copilot-setup-steps:
    runs-on: ubuntu-latest

    # Keep permissions to the minimum required for the setup steps below.
    # The agent receives its own token for the work it performs after setup.
    permissions:
      contents: read

    steps:
      # Check out the repository so subsequent steps can access the code.
      - name: Checkout
        uses: actions/checkout@v4

      # ── Node.js / npm example ──────────────────────────────────────────────
      # Remove or replace this block if your project does not use Node.js.
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install npm dependencies
        run: npm ci --ignore-scripts
